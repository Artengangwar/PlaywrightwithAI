[pytest]
# Where pytest should look for tests
testpaths = tests
# Test options:
# -q = quiet mode (less output)
# -v = verbose (show more details)
# --headed = show browser window (for playwright)
addopts = -q

# Playwright options
# Use headless=False to see the browser while tests run
# Set this to True if you're running tests in CI/CD
# Example: PLAYWRIGHT_HEADLESS=False pytest tests/
